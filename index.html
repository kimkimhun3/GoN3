<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N3 単語帳 — JLPT N3 Kanji Words</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="N3 Kanji">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#24405E">
<script src="push.js" defer></script>
<style>
  :root{
    --paper:#F6F3EC;
    --paper-2:#FBF9F4;
    --ink:#2A2723;
    --ink-soft:#6B645B;
    --line:#E2DCD0;
    --ai:#24405E;      /* 藍 indigo */
    --shu:#BC3B2E;     /* 朱 vermilion */
    --gold:#A8884C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.5;
    padding-bottom:80px;
  }
  .jp{font-family:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Noto Serif JP",serif;}
  .jp-g{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo","Noto Sans JP",sans-serif;}

  /* ---- header ---- */
  header{
    position:relative;
    padding:34px 20px 22px;
    border-bottom:1px solid var(--line);
    background:var(--paper-2);
  }
  .wrap{max-width:1020px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--ai);font-weight:600;margin-bottom:6px;
  }
  h1{
    font-size:clamp(28px,6vw,42px);font-weight:700;letter-spacing:-.01em;
    display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
  }
  h1 .kanji{font-size:1.15em;color:var(--ink)}
  h1 .en{font-size:.52em;font-weight:500;color:var(--ink-soft);letter-spacing:.02em}
  .seal{
    position:absolute;top:26px;right:20px;
    width:54px;height:54px;border:2px solid var(--shu);border-radius:8px;
    color:var(--shu);display:flex;align-items:center;justify-content:center;
    font-size:30px;transform:rotate(-4deg);opacity:.9;
  }
  @media(max-width:520px){.seal{display:none}}

  /* ---- progress ---- */
  .progress-row{display:flex;align-items:center;gap:12px;margin-top:18px;font-size:13px;color:var(--ink-soft)}
  .bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:var(--ai);transition:width .35s ease}
  .pct{font-variant-numeric:tabular-nums;font-weight:600;color:var(--ai)}

  /* ---- controls ---- */
  .controls{max-width:1020px;margin:18px auto 0;padding:0 20px;display:flex;flex-direction:column;gap:14px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search{
    flex:1;min-width:180px;display:flex;align-items:center;gap:8px;
    background:var(--paper-2);border:1px solid var(--line);border-radius:10px;padding:9px 12px;
  }
  .search input{border:0;background:transparent;outline:0;font-size:15px;color:var(--ink);width:100%}
  .search svg{flex:none;opacity:.5}
  .btn{
    border:1px solid var(--line);background:var(--paper-2);color:var(--ink);
    padding:9px 14px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;
    transition:all .15s ease;white-space:nowrap;
  }
  .btn:hover{border-color:var(--ai);color:var(--ai)}
  .btn.on{background:var(--ai);border-color:var(--ai);color:#fff}
  .btn.shu.on{background:var(--shu);border-color:var(--shu)}

  /* ---- category pills ---- */
  .cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .cats::-webkit-scrollbar{height:0}
  .pill{
    border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    padding:6px 13px;border-radius:99px;font-size:13px;cursor:pointer;white-space:nowrap;
    transition:all .15s ease;
  }
  .pill:hover{color:var(--ai)}
  .pill.on{background:var(--ink);color:var(--paper-2);border-color:var(--ink)}
  .pill .n{opacity:.55;font-size:.85em;margin-left:4px}

  /* ---- grid ---- */
  main{max-width:1020px;margin:22px auto 0;padding:0 20px}
  .group-title{
    font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);
    font-weight:700;margin:26px 0 12px;display:flex;align-items:center;gap:10px;
  }
  .group-title::after{content:"";flex:1;height:1px;background:var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
  .card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:12px;
    padding:16px 16px 14px;position:relative;cursor:pointer;
    transition:transform .12s ease,box-shadow .15s ease,border-color .15s ease;
    overflow:hidden;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(42,39,35,.07);border-color:#d2cabb}
  .card .kanji{font-size:30px;font-weight:700;letter-spacing:.02em;color:var(--ink);line-height:1.15}
  .card .read{font-size:15px;color:var(--ai);margin-top:4px;min-height:22px;transition:opacity .15s}
  .card .mean{font-size:13px;color:var(--ink-soft);margin-top:6px;min-height:18px;transition:opacity .15s}
  body.hide-read .card:not(.peek) .read,
  body.hide-mean .card:not(.peek) .mean{opacity:0}
  .card .hint{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-size:12px;color:var(--ink-soft);pointer-events:none}
  body.hide-read .card:not(.peek):hover .kanji{opacity:.25;transition:opacity .15s}
  /* learned stamp */
  .stamp{
    position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:6px;
    border:1.5px solid var(--line);color:transparent;display:flex;align-items:center;
    justify-content:center;font-size:13px;transition:all .15s ease;
  }
  .card.learned{border-color:#d8c4ad;background:linear-gradient(135deg,#FBF9F4,#F6EFE4)}
  .card.learned .stamp{border-color:var(--shu);color:var(--shu);font-family:serif}

  /* ---- mode switch ---- */
  .modeswitch{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
  .modeswitch button{border:0;background:transparent;color:var(--ink-soft);padding:7px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s ease}
  .modeswitch button.on{background:var(--ai);color:#fff}

  /* ---- grammar cards ---- */
  .ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .gcard{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;position:relative}
  .gcard.learned{border-color:#d8c4ad;background:linear-gradient(135deg,#FBF9F4,#F6EFE4)}
  .gcard .pat{font-size:22px;font-weight:700;color:var(--ink);line-height:1.3;padding-right:30px}
  .gcard .use{font-size:14px;color:var(--ai);margin-top:5px;font-weight:600}
  .gcard .form{font-size:12.5px;color:var(--ink-soft);margin-top:8px;padding:6px 9px;background:var(--paper);border-radius:7px;border:1px solid var(--line)}
  .gcard .ex{margin-top:11px;padding-left:12px;border-left:2px solid var(--gold)}
  .gcard .ex .jpx{font-size:15px;color:var(--ink);line-height:1.5}
  .gcard .ex .enx{font-size:13px;color:var(--ink-soft);margin-top:1px}
  .gcard .ex + .ex{margin-top:9px}
  .gcard .stamp{top:12px;right:12px}

  .empty{text-align:center;color:var(--ink-soft);padding:60px 20px;font-size:15px}

  /* ---- flashcard overlay ---- */
  .fc{
    position:fixed;inset:0;background:rgba(34,31,27,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .fc.show{display:flex}
  .fc-inner{width:100%;max-width:440px}
  .fc-meta{display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:14px;font-size:13px}
  .fc-close{background:rgba(255,255,255,.15);border:0;color:#fff;width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer}
  .flip{perspective:1200px;cursor:pointer}
  .flip-in{position:relative;width:100%;min-height:300px;transition:transform .5s;transform-style:preserve-3d}
  .flip.flipped .flip-in{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--paper-2);border-radius:18px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:28px;text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
  }
  .face.back{transform:rotateY(180deg)}
  .face .big{font-size:64px;font-weight:700;color:var(--ink);line-height:1.1}
  .face .read{font-size:26px;color:var(--ai);margin-top:8px}
  .face .mean{font-size:18px;color:var(--ink-soft);margin-top:10px}
  .face .tap{position:absolute;bottom:16px;font-size:12px;color:var(--ink-soft);opacity:.7}
  .fc-actions{display:flex;gap:10px;margin-top:16px}
  .fc-actions button{flex:1;padding:13px;border-radius:12px;border:0;font-size:15px;font-weight:600;cursor:pointer;color:#fff}
  .again{background:#7a7066}
  .know{background:var(--ai)}
  .face.gfront .big{font-size:34px;line-height:1.3}
  .face.gback{align-items:flex-start;text-align:left;justify-content:flex-start;overflow-y:auto;padding:24px}
  .face.gback .guse{font-size:17px;color:var(--ai);font-weight:700}
  .face.gback .gform{font-size:13px;color:var(--ink-soft);margin:8px 0}
  .face.gback .gex{font-size:15px;color:var(--ink);margin-top:10px;line-height:1.5}
  .face.gback .gex small{display:block;color:var(--ink-soft);font-size:13px;margin-top:1px}
  .fc-done{background:var(--paper-2);border-radius:18px;padding:44px 28px;text-align:center}
  .fc-done h3{font-size:22px;margin-bottom:8px}
  .fc-done p{color:var(--ink-soft);margin-bottom:20px}
  .fc-done button{background:var(--ai);color:#fff;border:0;padding:12px 22px;border-radius:10px;font-size:15px;cursor:pointer}

  footer{max-width:1020px;margin:40px auto 0;padding:20px;color:var(--ink-soft);font-size:12px;text-align:center;border-top:1px solid var(--line)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="eyebrow">JLPT N3 Vocabulary</div>
    <h1><span class="kanji jp">N3 単語帳</span><span class="en">— Kanji words to remember</span></h1>
    <div class="seal jp">學</div>
    <div class="progress-row">
      <span class="pct" id="pct">0%</span>
      <div class="bar"><i id="barFill"></i></div>
      <span id="learnedCount">0 / 0 learned</span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="modeswitch">
    <button data-mode="words" class="on">単語 Words</button>
    <button data-mode="grammar">文法 Grammar</button>
  </div>
  <div class="toolbar">
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search kanji, reading, or meaning…">
    </label>
    <button class="btn" id="toggleRead">Hide readings</button>
    <button class="btn shu" id="toggleLearned">Hide learned</button>
    <button class="btn on" id="flashBtn">▶ Flashcards</button>
    <button class="btn" id="enablePush">🔔 Enable reminders</button>
  </div>
  <div class="cats" id="cats"></div>
</div>

<main id="main"></main>

<footer>
  <span id="total"></span> · Tap a card to reveal · Tap the corner stamp to mark as learned · Progress saves automatically
</footer>

<!-- Flashcard overlay -->
<div class="fc" id="fc">
  <div class="fc-inner">
    <div class="fc-meta">
      <span id="fcProg">1 / 1</span>
      <button class="fc-close" id="fcClose">×</button>
    </div>
    <div id="fcBody"></div>
  </div>
</div>

const GCAT_ORDER = ["Cause / Reason","Contrast / Concession","Time / Sequence","Condition",
  "Purpose / Intention","Estimation / Hearsay","Change / Result","Manner / State",
  "Degree / Extent","Addition / Emphasis","Expressions"];

// ---------- STATE ----------
let mode = "words";          // "words" | "grammar"
let learned = new Set();
let learnedG = new Set();
let activeCat = "all";
let query = "";
let hideRead = false;
let hideLearned = false;

const STORE_KEY  = "n3_learned";
const STORE_KEYG = "n3_learned_grammar";

// ---------- helpers ----------
const activeList = () => mode === "words" ? WORDS : GRAMMAR;
const curLearned = () => mode === "words" ? learned : learnedG;
const curCats    = () => mode === "words" ? CAT_ORDER : GCAT_ORDER;
const catOf      = (it) => mode === "words" ? it[3] : it[7];

// ---------- PERSISTENCE ----------
async function loadLearned(){
  try{ const r = await window.storage.get(STORE_KEY);  if(r&&r.value) learned  = new Set(JSON.parse(r.value)); }catch(e){}
  try{ const r = await window.storage.get(STORE_KEYG); if(r&&r.value) learnedG = new Set(JSON.parse(r.value)); }catch(e){}
}
async function saveLearned(){
  const key = mode === "words" ? STORE_KEY : STORE_KEYG;
  try{ await window.storage.set(key, JSON.stringify([...curLearned()])); }catch(e){}
}

// ---------- RENDER ----------
const main = document.getElementById('main');
const catsEl = document.getElementById('cats');

function counts(){
  const c = {};
  activeList().forEach(it => { const k = catOf(it); c[k] = (c[k]||0)+1; });
  return c;
}

function renderCats(){
  const c = counts();
  let html = `<button class="pill ${activeCat==='all'?'on':''}" data-cat="all">All<span class="n">${activeList().length}</span></button>`;
  curCats().forEach(cat=>{
    if(!c[cat]) return;
    html += `<button class="pill ${activeCat===cat?'on':''}" data-cat="${cat}">${cat}<span class="n">${c[cat]}</span></button>`;
  });
  catsEl.innerHTML = html;
  catsEl.querySelectorAll('.pill').forEach(p=>{
    p.onclick = ()=>{ activeCat = p.dataset.cat; renderCats(); renderGrid(); };
  });
}

function matches(it){
  if(activeCat!=='all' && catOf(it)!==activeCat) return false;
  if(hideLearned && curLearned().has(it[0])) return false;
  if(query){
    const q = query.toLowerCase();
    if(mode==='words') return it[0].includes(query)||it[1].includes(query)||it[2].toLowerCase().includes(q);
    return it[0].includes(query)||it[1].toLowerCase().includes(q)||it[2].includes(query)
      ||it[3].includes(query)||it[4].toLowerCase().includes(q)||it[5].includes(query)||it[6].toLowerCase().includes(q);
  }
  return true;
}

function cardHTML(it){
  const isL = curLearned().has(it[0]);
  if(mode==='words'){
    return `<div class="card ${isL?'learned':''}" data-k="${it[0]}">
      <div class="stamp" data-stamp="${it[0]}">済</div>
      <div class="kanji jp">${it[0]}</div>
      <div class="read jp-g">${it[1]}</div>
      <div class="mean">${it[2]}</div>
    </div>`;
  }
  return `<div class="gcard ${isL?'learned':''}">
    <div class="stamp" data-stamp="${it[0]}">済</div>
    <div class="pat jp-g">${it[0]}</div>
    <div class="use">${it[1]}</div>
    <div class="form jp-g">${it[2]}</div>
    <div class="ex"><div class="jpx jp-g">${it[3]}</div><div class="enx">${it[4]}</div></div>
    <div class="ex"><div class="jpx jp-g">${it[5]}</div><div class="enx">${it[6]}</div></div>
  </div>`;
}

function renderGrid(){
  const list = activeList().filter(matches);
  if(list.length===0){
    main.innerHTML = `<div class="empty">No ${mode==='words'?'words':'grammar points'} match your search.</div>`;
    return;
  }
  const gridClass = mode==='words' ? 'grid' : 'ggrid';
  let html = "";
  const cats = activeCat==='all' ? curCats() : [activeCat];
  cats.forEach(cat=>{
    const items = list.filter(it=>catOf(it)===cat);
    if(items.length===0) return;
    html += `<div class="group-title">${cat}</div><div class="${gridClass}">`;
    items.forEach(it=> html += cardHTML(it));
    html += `</div>`;
  });
  main.innerHTML = html;

  if(mode==='words'){
    main.querySelectorAll('.card').forEach(card=>{
      card.onclick = (e)=>{
        if(e.target.dataset.stamp) return;
        card.classList.toggle('peek');
      };
    });
  }
  main.querySelectorAll('.stamp').forEach(s=>{
    s.onclick = (e)=>{
      e.stopPropagation();
      const k = s.dataset.stamp;
      const set = curLearned();
      if(set.has(k)) set.delete(k); else set.add(k);
      saveLearned();
      const card = s.closest('.card,.gcard');
      card.classList.toggle('learned');
      if(hideLearned && set.has(k)) { renderGrid(); }
      updateProgress();
    };
  });
}

function updateProgress(){
  const total = activeList().length;
  const set = curLearned();
  const got = activeList().filter(it=>set.has(it[0])).length;
  const pct = total ? Math.round(got/total*100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('learnedCount').textContent = `${got} / ${total} learned`;
  document.getElementById('total').textContent = mode==='words' ? `${total} N3 words` : `${total} N3 grammar points`;
}

// ---------- CONTROLS ----------
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', e=>{
  query = e.target.value.trim(); renderGrid();
});
document.getElementById('toggleRead').addEventListener('click', e=>{
  hideRead = !hideRead;
  document.body.classList.toggle('hide-read', hideRead);
  e.target.textContent = hideRead ? 'Show readings' : 'Hide readings';
  e.target.classList.toggle('on', hideRead);
});
document.getElementById('toggleLearned').addEventListener('click', e=>{
  hideLearned = !hideLearned;
  e.target.textContent = hideLearned ? 'Show learned' : 'Hide learned';
  e.target.classList.toggle('on', hideLearned);
  renderGrid();
});

function switchMode(m){
  if(m===mode) return;
  mode = m;
  activeCat = 'all'; query = ''; searchInput.value = '';
  document.querySelectorAll('.modeswitch button').forEach(b=> b.classList.toggle('on', b.dataset.mode===m));
  if(hideRead){ hideRead=false; document.body.classList.remove('hide-read');
    const tr=document.getElementById('toggleRead'); tr.textContent='Hide readings'; tr.classList.remove('on'); }
  document.getElementById('toggleRead').style.display = (m==='words') ? '' : 'none';
  searchInput.placeholder = (m==='words')
    ? 'Search kanji, reading, or meaning…'
    : 'Search pattern, meaning, or example…';
  document.querySelector('.eyebrow').textContent = (m==='words') ? 'JLPT N3 Vocabulary' : 'JLPT N3 Grammar';
  renderCats(); renderGrid(); updateProgress();
}
document.querySelectorAll('.modeswitch button').forEach(b=>{
  b.addEventListener('click', ()=> switchMode(b.dataset.mode));
});

// ---------- FLASHCARDS ----------
const fc = document.getElementById('fc');
const fcBody = document.getElementById('fcBody');
const fcProg = document.getElementById('fcProg');
let deck = [], di = 0;

function startFlash(){
  // build deck from currently filtered set (respect mode + category + hideLearned)
  deck = activeList().filter(matches);
  if(deck.length===0) deck = activeList().slice();
  // shuffle
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  di = 0;
  fc.classList.add('show');
  showCard();
}
function showCard(){
  if(di>=deck.length){ showDone(); return; }
  const it = deck[di];
  fcProg.textContent = `${di+1} / ${deck.length}`;
  let front, back, gf = '', gb = '';
  if(mode==='words'){
    front = `<div class="big jp">${it[0]}</div>`;
    back  = `<div class="read jp-g">${it[1]}</div><div class="mean">${it[2]}</div>
             <div class="tap">Tap to flip back</div>`;
  } else {
    gf = ' gfront'; gb = ' gback';
    front = `<div class="big jp-g">${it[0]}</div>`;
    back  = `<div class="guse">${it[1]}</div>
             <div class="gform jp-g">${it[2]}</div>
             <div class="gex jp-g">${it[3]}<small>${it[4]}</small></div>
             <div class="gex jp-g">${it[5]}<small>${it[6]}</small></div>`;
  }
  fcBody.innerHTML = `
    <div class="flip" id="flip">
      <div class="flip-in">
        <div class="face front${gf}">${front}<div class="tap">Tap to flip</div></div>
        <div class="face back${gb}">${back}</div>
      </div>
    </div>
    <div class="fc-actions">
      <button class="again" id="again">↻ Again</button>
      <button class="know" id="know">✓ I knew it</button>
    </div>`;
  document.getElementById('flip').onclick = ()=> document.getElementById('flip').classList.toggle('flipped');
  document.getElementById('again').onclick = ()=>{ di++; showCard(); };
  document.getElementById('know').onclick = ()=>{
    curLearned().add(it[0]); saveLearned(); updateProgress();
    di++; showCard();
  };
}
function showDone(){
  const set = curLearned();
  const got = activeList().filter(it=>set.has(it[0])).length;
  fcProg.textContent = `${deck.length} / ${deck.length}`;
  fcBody.innerHTML = `<div class="fc-done">
    <h3>お疲れさま！ Deck complete</h3>
    <p>You've reviewed ${deck.length} cards. ${got} ${mode==='words'?'words':'grammar points'} marked learned overall.</p>
    <button id="fcRestart">Shuffle again</button>
  </div>`;
  document.getElementById('fcRestart').onclick = startFlash;
}
function closeFlash(){ fc.classList.remove('show'); renderGrid(); }
document.getElementById('flashBtn').onclick = startFlash;
document.getElementById('fcClose').onclick = closeFlash;
fc.addEventListener('click', e=>{ if(e.target===fc) closeFlash(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && fc.classList.contains('show')) closeFlash(); });

// ---------- INIT ----------
(async function(){
  await loadLearned();
  renderCats();
  renderGrid();
  updateProgress();
})();
</script>
</body>
</html>
